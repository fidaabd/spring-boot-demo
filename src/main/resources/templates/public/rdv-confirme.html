<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RDV Confirmé</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5 text-center border-0 rounded-4 shadow">
                <i class="bi bi-check-circle-fill text-success"
                   style="font-size: 80px;"></i>
                <h2 class="mt-3 fw-bold">RDV Enregistré !</h2>
                <p class="text-muted">
                    Votre demande de rendez-vous a été enregistrée avec succès.
                    Notre secrétaire vous contactera pour confirmation.
                </p>
                <hr>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/public/accueil}"
                       class="btn btn-primary">
                        <i class="bi bi-house"></i> Accueil
                    </a>
                    <a th:href="@{/public/rdv}"
                       class="btn btn-outline-primary">
                        <i class="bi bi-calendar-plus"></i> Nouveau RDV
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</body>
</html>
