<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Médecin</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-hospital"></i> Cabinet
            </h5>
            <a th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <a th:href="@{/medecins}">
                <i class="bi bi-person-badge"></i> Médecins
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">
                <i class="bi bi-person-plus"></i>
                <span th:text="${medecin.id == null} ? 'Nouveau Médecin' : 'Modifier Médecin'"></span>
            </h2>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="${medecin.id == null} ? @{/medecins/nouveau} : @{/medecins/modifier/{id}(id=${medecin.id})}"
                          th:object="${medecin}"
                          method="post">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nom *</label>
                                <input type="text"
                                       th:field="*{nom}"
                                       class="form-control"
                                       required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prénom *</label>
                                <input type="text"
                                       th:field="*{prenom}"
                                       class="form-control"
                                       required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Spécialité *</label>
                                <input type="text"
                                       th:field="*{specialite}"
                                       class="form-control"
                                       required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">N° Ordre *</label>
                                <input type="text"
                                       th:field="*{numeroOrdre}"
                                       class="form-control"
                                       required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Téléphone</label>
                                <input type="text"
                                       th:field="*{telephone}"
                                       class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email"
                                       th:field="*{email}"
                                       class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox"
                                       th:field="*{actif}"
                                       class="form-check-input">
                                <label class="form-check-label">Médecin actif</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Sauvegarder
                            </button>
                            <a th:href="@{/medecins}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
