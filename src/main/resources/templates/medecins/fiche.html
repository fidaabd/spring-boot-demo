<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fiche Médecin</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-hospital"></i> Cabinet
            </h5>
            <a th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <a th:href="@{/medecins}">
                <i class="bi bi-person-badge"></i> Médecins
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-person-badge"></i> Fiche Médecin</h2>
                <div class="d-flex gap-2">
                    <a th:href="@{/medecins/modifier/{id}(id=${medecin.id})}"
                       class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Modifier
                    </a>
                    <a th:href="@{/medecins}"
                       class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Retour
                    </a>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Informations du Médecin</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Nom :</strong>
                                <span th:text="${medecin.nom}"></span></p>
                            <p><strong>Prénom :</strong>
                                <span th:text="${medecin.prenom}"></span></p>
                            <p><strong>Spécialité :</strong>
                                <span th:text="${medecin.specialite}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>N° Ordre :</strong>
                                <span th:text="${medecin.numeroOrdre}"></span></p>
                            <p><strong>Téléphone :</strong>
                                <span th:text="${medecin.telephone}"></span></p>
                            <p><strong>Email :</strong>
                                <span th:text="${medecin.email}"></span></p>
                            <p><strong>Statut :</strong>
                                <span th:if="${medecin.actif}"
                                      class="badge bg-success">Actif</span>
                                <span th:unless="${medecin.actif}"
                                      class="badge bg-danger">Inactif</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
