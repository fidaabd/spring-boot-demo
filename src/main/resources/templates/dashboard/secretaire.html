<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Secrétaire</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #1e8449;
        }
        .sidebar a {
            color: #a9dfbf;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover {
            background: #27ae60;
            color: white;
        }
        .card-stat {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar Secrétaire -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-person-workspace"></i> Secrétaire
            </h5>
            <a th:href="@{/dashboard/secretaire}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/rdv/nouveau}">
                <i class="bi bi-calendar-plus"></i> Nouveau RDV
            </a>
            <a th:href="@{/rdv/liste}">
                <i class="bi bi-calendar3"></i> Liste RDV
            </a>
            <a th:href="@{/rdv/calendrier}">
                <i class="bi bi-calendar-week"></i> Calendrier
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu Secrétaire -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-speedometer2"></i> Dashboard Secrétaire</h2>
                <span class="badge bg-success fs-6">
                    <i class="bi bi-person-workspace"></i> Secrétaire
                </span>
            </div>

            <!-- Statistiques -->
            <div class="row mb-4 g-3">
                <div class="col-md-4">
                    <div class="card card-stat p-3 bg-success text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6>RDV Aujourd'hui</h6>
                                <h2 th:text="${#lists.size(rdvAujourdhui)}">0</h2>
                            </div>
                            <i class="bi bi-calendar-check fs-1"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-stat p-3 bg-warning text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6>RDV Semaine</h6>
                                <h2 th:text="${#lists.size(rdvSemaine)}">0</h2>
                            </div>
                            <i class="bi bi-calendar-week fs-1"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-stat p-3 bg-primary text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6>Total Patients</h6>
                                <h2 th:text="${totalPatients}">0</h2>
                            </div>
                            <i class="bi bi-people fs-1"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions rapides -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <a th:href="@{/rdv/nouveau}"
                       class="btn btn-success w-100 p-3">
                        <i class="bi bi-calendar-plus fs-4"></i><br>
                        Nouveau RDV
                    </a>
                </div>
                <div class="col-md-6">
                    <a th:href="@{/rdv/calendrier}"
                       class="btn btn-primary w-100 p-3">
                        <i class="bi bi-calendar-week fs-4"></i><br>
                        Voir Calendrier
                    </a>
                </div>
            </div>

            <!-- RDV du jour -->
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between">
                    <h5 class="mb-0">
                        <i class="bi bi-calendar-day"></i> RDV d'aujourd'hui
                    </h5>
                    <a th:href="@{/rdv/nouveau}"
                       class="btn btn-sm btn-success">
                        <i class="bi bi-plus"></i> Ajouter
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(rdvAujourdhui)}"
                         class="text-center text-muted py-3">
                        Aucun rendez-vous aujourd'hui
                    </div>
                    <table th:if="${!#lists.isEmpty(rdvAujourdhui)}"
                           class="table table-hover">
                        <thead class="table-success">
                        <tr>
                            <th>Heure</th>
                            <th>Patient</th>
                            <th>Motif</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rdv : ${rdvAujourdhui}">
                            <td th:text="${#temporals.format(rdv.dateHeure, 'HH:mm')}"></td>
                            <td th:text="${rdv.patient.nom + ' ' + rdv.patient.prenom}"></td>
                            <td th:text="${rdv.motif}"></td>
                            <td>
                                    <span class="badge bg-success"
                                          th:text="${rdv.statut}"></span>
                            </td>
                            <td>
                                <a th:href="@{/rdv/modifier/{id}(id=${rdv.id})}"
                                   class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/rdv/annuler/{id}(id=${rdv.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Annuler ce RDV ?')">
                                    <i class="bi bi-x"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
