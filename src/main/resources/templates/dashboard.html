<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — Cabinet Médical</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
            color: white;
        }
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover {
            background: #3498db;
            color: white;
        }
        .card-stat {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-hospital"></i> Cabinet
            </h5>
            <a th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <a th:href="@{/medecins}">
                <i class="bi bi-person-badge"></i> Médecins
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">
                <i class="bi bi-speedometer2"></i> Tableau de bord
            </h2>

            <!-- Statistiques -->
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-3 bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Total Patients</h6>
                                <h2 th:text="${totalPatients}">0</h2>
                            </div>
                            <i class="bi bi-people fs-1"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-3 bg-success text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Total Médecins</h6>
                                <h2 th:text="${totalMedecins}">0</h2>
                            </div>
                            <i class="bi bi-person-badge fs-1"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-3 bg-warning text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>RDV Aujourd'hui</h6>
                                <h2 th:text="${#lists.size(rdvAujourdhui)}">0</h2>
                            </div>
                            <i class="bi bi-calendar-check fs-1"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RDV du jour -->
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">
                        <i class="bi bi-calendar-day"></i> RDV d'aujourd'hui
                    </h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(rdvAujourdhui)}"
                         class="text-center text-muted py-3">
                        Aucun rendez-vous aujourd'hui
                    </div>
                    <table th:if="${!#lists.isEmpty(rdvAujourdhui)}"
                           class="table table-hover">
                        <thead>
                        <tr>
                            <th>Heure</th>
                            <th>Patient</th>
                            <th>Médecin</th>
                            <th>Motif</th>
                            <th>Statut</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rdv : ${rdvAujourdhui}">
                            <td th:text="${#temporals.format(rdv.dateHeure, 'HH:mm')}"></td>
                            <td th:text="${rdv.patient.nom + ' ' + rdv.patient.prenom}"></td>
                            <td th:text="${rdv.medecin.nom + ' ' + rdv.medecin.prenom}"></td>
                            <td th:text="${rdv.motif}"></td>
                            <td>
                                    <span class="badge bg-primary"
                                          th:text="${rdv.statut}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
