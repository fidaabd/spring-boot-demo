<!-- Ghofrane - Recherche patients -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste Patients</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
        }
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-hospital"></i> Cabinet
            </h5>
            <a th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <a th:href="@{/medecins}">
                <i class="bi bi-person-badge"></i> Médecins
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-people"></i> Patients</h2>
                <a th:href="@{/patients/nouveau}"
                   class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Nouveau Patient
                </a>
            </div>

            <!-- Recherche -->
            <form th:action="@{/patients}" method="get" class="mb-4">
                <div class="input-group">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Rechercher par nom, CIN, téléphone..."
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-outline-primary">
                        <i class="bi bi-search"></i> Rechercher
                    </button>
                    <a th:href="@{/patients}" class="btn btn-outline-secondary">
                        <i class="bi bi-x"></i> Effacer
                    </a>
                </div>
            </form>

            <!-- Table -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>CIN</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Date Naissance</th>
                            <th>Téléphone</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="patient : ${patients}">
                            <td th:text="${patient.cin}"></td>
                            <td th:text="${patient.nom}"></td>
                            <td th:text="${patient.prenom}"></td>
                            <td th:text="${#temporals.format(patient.dateNaissance, 'dd/MM/yyyy')}"></td>
                            <td th:text="${patient.telephone}"></td>
                            <td>
                                <a th:href="@{/patients/{id}(id=${patient.id})}"
                                   class="btn btn-sm btn-info text-white">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/patients/modifier/{id}(id=${patient.id})}"
                                   class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/patients/supprimer/{id}(id=${patient.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Supprimer ce patient ?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
