<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau RDV</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 2px 0;
        }
        .sidebar a:hover { background: #3498db; color: white; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-white mb-4">
                <i class="bi bi-hospital"></i> Cabinet
            </h5>
            <a th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/patients}">
                <i class="bi bi-people"></i> Patients
            </a>
            <a th:href="@{/rdv/liste}">
                <i class="bi bi-calendar3"></i> Liste RDV
            </a>
            <a th:href="@{/rdv/calendrier}">
                <i class="bi bi-calendar-week"></i> Calendrier
            </a>
            <hr class="text-white">
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>

        <!-- Contenu -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">
                <i class="bi bi-calendar-plus"></i> Nouveau Rendez-vous
            </h2>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/rdv/nouveau}"
                          th:object="${rendezVous}"
                          method="post">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Patient *</label>
                                <select th:field="*{patient}"
                                        class="form-select" required>
                                    <option value="">-- Sélectionner patient --</option>
                                    <option th:each="p : ${patients}"
                                            th:value="${p.id}"
                                            th:text="${p.nom + ' ' + p.prenom}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Médecin *</label>
                                <select th:field="*{medecin}"
                                        class="form-select" required>
                                    <option value="">-- Sélectionner médecin --</option>
                                    <option th:each="m : ${medecins}"
                                            th:value="${m.id}"
                                            th:text="${'Dr. ' + m.nom + ' ' + m.prenom}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date et Heure *</label>
                                <input type="datetime-local"
                                       th:field="*{dateHeure}"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Durée (minutes)</label>
                                <select th:field="*{dureeMinutes}"
                                        class="form-select">
                                    <option value="15">15 minutes</option>
                                    <option value="30" selected>30 minutes</option>
                                    <option value="45">45 minutes</option>
                                    <option value="60">1 heure</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Motif *</label>
                            <textarea th:field="*{motif}"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Motif de la consultation"
                                      required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Statut</label>
                            <select th:field="*{statut}" class="form-select">
                                <option value="PLANIFIE">Planifié</option>
                                <option value="CONFIRME">Confirmé</option>
                            </select>
                        </div>

                        <!-- Alerte chevauchement -->
                        <div th:if="${erreur}"
                             class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i>
                            <span th:text="${erreur}"></span>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Sauvegarder
                            </button>
                            <a th:href="@{/rdv/liste}"
                               class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
